name: Build PNG-128 Font and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: release-fonts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libcairo2-dev \
            libharfbuzz-bin \
            imagemagick \
            pngquant \
            zopfli

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate emoji source assets
        run: python size_check.py --png-dir png/128 --skip-svg

      - name: Build font
        run: bash ./full_rebuild.sh

      - name: Inspect built font
        shell: bash
        run: |
          du -sh build/emoji build/quantized_pngs build/compressed_pngs
          ls -lh fonts/NotoColorEmoji.ttf
          file fonts/NotoColorEmoji.ttf

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: noto-color-emoji-png128-${{ github.sha }}
          path: |
            fonts/NotoColorEmoji.ttf
            fonts/LICENSE
          if-no-files-found: error

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
            echo "name=Release ${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          else
            echo "tag=auto-${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"
            echo "name=Auto build ${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          files: |
            fonts/NotoColorEmoji.ttf
            fonts/LICENSE
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
